name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4  # Atualizado para v4 (remove o aviso do Node 20)
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: '0212023c95630aeb978f0a8aed87a35d81625154f477f517bced44c71d8c9c0202-590e76a0-9cfc-4743-86cf-271c2a9e997100f04260b090ca0f'
          action: "upload"
          app_location: "/mfe-agendamento" 
          api_location: ""
          output_location: "dist" 
          app_build_command: "npm install && npm run build" # Força o build manual se o automático falhar
